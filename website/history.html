<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>K-Tech Café — Order History</title>
    <link rel="stylesheet" href="/website/public/css/history.css">
</head>

<body>
    <div class="wrap">
        <div class="top">
            <button class="back" id="homeBtn">← Home</button>
            <h1 style="margin:0">Order History</h1>
            <div style="flex:1"></div>
            <button class="small-btn" id="clearAll">Clear All</button>
        </div>

        <div id="tableWrap"></div>
    </div>

    <!-- proof viewer modal -->
    <div id="proofModal"
        style="display:none;position:fixed;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;z-index:2200">
        <div style="background:#0b1220;padding:16px;border-radius:10px;max-width:680px;width:60%;text-align:center">
            <div id="proofContent"></div>
            <div style="margin-top:12px"><button class="small-btn"
                    onclick="document.getElementById('proofModal').style.display='none'">Close</button></div>
        </div>
    </div>

    <script type="module" src="/website/public/js/history.js"></script>

</body>

</html>
